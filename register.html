<body class="login-page">
<div class="login-container zoom-in">
<div class="left-panel text-white">
<h2>Unlock your Way <br> to Pure Comfort</h2>
<p>Register to enjoy calm, peace, and daily massage for total relaxation and happiness</p>
<img src="images/login-bg.webp" alt="Signup Banner" class="img-animated">
</div>
<div class="right-panel">
<div class="brand-logo">
<img src="images/rotai-logo.png" alt="Rotai">
</div>
<h3>Register Your Account</h3>
<p>Create your  account to get started</p>
<form>
<div class="form-group mb-3">
<input type="text" class="form-control" placeholder="Full Name">
</div>
<div class="form-group mb-3">
<input type="email" class="form-control" placeholder="Email address">
</div>
<div class="form-group mb-3">
<input type="password" class="form-control" placeholder="Password">
</div>
<div class="form-group mb-3">
<input type="password" class="form-control" placeholder="Confirm Password">
</div>
<a href="login.html" class="btn btn-primary w-100">Register</a>
</form>
<div class="text-center text-muted mb-3 mt-3">Or Register with</div>
<div class="social-login mb-4">
<button class="social-btn"><img src="images/google-logo.png" alt="Google" width="20"> Google</button>

</div>
<div class="signup-link">Already have an account? <a href="login.html">Login</a></div>
</div>
</div>

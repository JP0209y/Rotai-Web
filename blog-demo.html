<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title></title>
  <meta name="description" content="">
  <meta name="keywords" content="">


<!-- Favicon CSS -->

<link href="./images/favicon.ico" rel="shortcut icon">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
rel="stylesheet">



<!-- Bootstrap & Font Awesome -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">


<!-- Main CSS -->
<link rel="stylesheet" href="css/rotai-style.css">
<link rel="stylesheet" href="css/responsive-style.css">


<!-- support-widget CSS -->
<link rel="stylesheet" href="css/support-widget.css">

 <!-- Meta tag JS -->
<script src="js/meta.js"></script>


</head>

<body>


  <section class="section-container ">
    <div class="container">

       <h2 class="mb-4 mb-md-5 text-center " >Latest article and blog</h2>


  <div class="row" id="blogContainer"></div>

 
    </div>
  </section>



<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
fetch('https://blog.rotai.in/wp-json/wp/v2/posts?_embed&per_page=6')
.then(response => response.json())
.then(posts => {

    let html = '';

    posts.forEach(post => {

        const image =
        post._embedded?.['wp:featuredmedia']?.[0]?.source_url || '';

        const title = post.title.rendered;

        const excerpt = post.excerpt.rendered
            .replace(/<[^>]*>/g, '')
            .trim();

        html += `
        <div class="col-md-6 col-lg-4">

            <a href="${post.link}"
               target="_blank"
               class="blog-post">

                ${
                    image
                    ? `
                    <div class="blog-thumb">
                        <img src="${image}"
                             alt="${title}"
                             class="blog-img">
                    </div>
                    `
                    : `
                    <div class="blog-thumb placeholder">
                        <span>No Image</span>
                    </div>
                    `
                }

                <div class="blog-content">
                    <h3 class="blog-title">
                        ${title}
                    </h3>

                    <p class="blog-summary">
                        ${excerpt.substring(0,150)}...
                    </p>
                </div>

            </a>

        </div>`;
    });

    document.getElementById('blogContainer').innerHTML = html;
})
.catch(error => {
    console.log(error);
});
</script>
</body>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Make an Enquiry</title>
    <meta name="description" content="" />
    <meta name="keywords" content="" />

    <!-- Favicon CSS -->

    <link href="./images/favicon.ico" rel="shortcut icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap & Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />

    <!-- Main CSS -->
    <link rel="stylesheet" href="css/rotai-style.css" />
    <link rel="stylesheet" href="css/responsive-style.css" />

    <!-- support-widget CSS -->
    <link rel="stylesheet" href="css/support-widget.css" />

    <!-- Meta tag JS -->
    <script src="js/meta.js"></script>
  </head>

  <body class="m-4">
          <!-- Product Enquiry Button -->
        <a class="btn btn-primary"
   data-bs-toggle="modal"
   data-bs-target="#enquiryModal"
   style="background:linear-gradient(90deg,#1a3c72,#ca5304); border:none;">

  <i class="fa-regular fa-envelope me-2"></i>
  Enquiry Now

</a>

    <!-- Enquiry Form Modal -->
    <div class="modal fade" id="enquiryModal" tabindex="-1" aria-hidden="true">
      <div
        class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable"
      >
        <div
          class="modal-content border-0 rounded-4 overflow-hidden position-relative"
        >
          <!-- Close Button -->
          <button
            type="button"
            class="btn-close position-absolute top-0 end-0 m-3 z-3"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>

          <div class="modal-body p-0">
            <div class="row g-0">
              <!-- Left Side -->
              <div class="col-lg-6 d-none d-lg-block">
                <img
                  src="images/Massage-Chair-Promotion-Banner-Template-light.webp"
                  class="w-100 h-100 object-fit-cover d-block"
                  alt="Rotai Banner"
                />
              </div>

              <!-- Right Side -->
              <div class="col-lg-6 bg-white p-4">
                <h2 class="fw-bold mb-2">Make an Enquiry</h2>

                <p class="text-muted mb-4">
                  Fill in your details and our team will connect with you
                  shortly.
                </p>

                <!-- Form -->
                <form id="popupForm">
                  <!-- Full Name -->
                  <div class="form-group mb-3">
                    <label for="name" class="form-label">
                      Full Name <span class="text-danger">*</span>
                    </label>

                    <input
                      type="text"
                      name="name"
                      id="name"
                      class="form-control"
                      placeholder="Enter Full Name"
                      required
                    />
                  </div>

                  <!-- Email -->
                  <div class="form-group mb-3">
                    <label for="email" class="form-label">
                      Email Address <span class="text-danger">*</span>
                    </label>

                    <input
                      type="email"
                      name="email"
                      id="email"
                      class="form-control"
                      placeholder="Enter Email Address"
                      required
                    />
                  </div>

                  <!-- Phone -->
                  <div class="form-group mb-3">
                    <label for="phone" class="form-label">
                      Phone No. <span class="text-danger">*</span>
                    </label>

                    <div class="input-group">
                      <span class="input-group-text"> 🇮🇳 +91 </span>

                      <input
                        type="tel"
                        name="phone"
                        id="phone"
                        class="form-control"
                        placeholder="Enter Phone Number"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        required
                      />
                    </div>
                  </div>

                  <!-- Product -->
                  <div class="form-group mb-4">
                    <label for="product" class="form-label"> Product </label>

                    <input
                      type="text"
                      name="product"
                      id="product"
                      class="form-control bg-light"
                      value="Rotai R-AUREX"
                      readonly
                    />
                  </div>

                  <!-- Submit -->
                  <button type="submit" class="btn btn-primary w-100 py-2">
                    Submit
                  </button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

   

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
